name: Deploy React App to GitHub Pages
on:
  push:
    branches: [main]
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Install dependencies
        run: npm install
        
      - name: Build project
        run: npm run build
        env:
          GITHUB_PAGES: "true"
          VITE_SUPABASE_URL: https://zqkdgzuxnbjreidqxdqk.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpxa2RnenV4bmJqcmVpZHF4ZHFrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3NTYwMzAsImV4cCI6MjA4OTMzMjAzMH0.Ra_74BYPj6PDmBkwSNbRRoqPZCEoSJ6WQgHv2OxVMZ8

      - name: Add SPA fallback for GitHub Pages
        run: cp dist/index.html dist/404.html
          
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist
          
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
